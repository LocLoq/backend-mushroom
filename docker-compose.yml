x-backend-common: &backend-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    MODEL_PATH: ${MODEL_PATH:-/models/model.pth}
  volumes:
    - ${MODEL_FILE_HOST_PATH:?Set MODEL_FILE_HOST_PATH to your .pth model file}:${MODEL_PATH:-/models/model.pth}:ro
  restart: unless-stopped

services:
  backend-cpu:
    <<: *backend-common
    container_name: mushroom-backend-cpu
    profiles: ["cpu"]
    ports:
      - "8000:8367"

  backend-gpu:
    <<: *backend-common
    container_name: mushroom-backend-gpu
    profiles: ["gpu"]
    ports:
      - "8000:8367"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]